{% extends "base.html" %}
{% block title %}Бэкапы{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card bg-dark text-white shadow">
            <div class="card-header bg-danger text-center">
                <h4><i class="bi bi-archive"></i> Бэкапы</h4>
            </div>
            <div class="card-body">
                <a href="{{ url_for('backup') }}" class="btn btn-success mb-3">
                    <i class="bi bi-plus-circle"></i> Создать бэкап
                </a>

                <table class="table table-dark">
                    <thead>
                        <tr><th>Дата</th><th>Действие</th></tr>
                    </thead>
                    <tbody>
                        {% for b in backups %}
                        <tr>
                            <td>{{ b.replace('bk_', '').replace('_', ' ') }}</td>
                            <td><a href="{{ url_for('restore', name=b) }}" class="btn btn-sm btn-warning" onclick="return confirm('Восстановить?')">Восстановить</a></td>
                        </tr>
                        {% else %}
                        <tr><td colspan="2">Нет бэкапов</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <a href="{{ url_for('profile') }}" class="btn btn-secondary mt-3">← Назад</a>
    </div>
</div>

{% endblock %}
